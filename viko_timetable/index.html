<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Primary meta -->
    <title>VIKO EIF Timetable</title>
    <meta name="description" content="VIKO EIF lecture timetable — view your class schedule and get daily Telegram notifications." />
    <meta name="theme-color" content="#005baa" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32"   href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- ── iOS PWA (Safari "Add to Home Screen") ───────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VIKO EIF" />

    <!-- Apple touch icons — iOS picks the closest size -->
    <!-- Root-level file: iOS auto-discovers /apple-touch-icon.png -->
    <link rel="apple-touch-icon"                 href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png" />

    <!-- iOS Splash Screens (generated from background + icon) -->
    <!-- iPhone 16 Pro Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone 16 Pro -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone 15 / 14 Pro Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone SE / 8 -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />
    <!-- iPad Pro 12.9" -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />
    <!-- iPad Pro 11" / Air -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />

    <!-- ── Android / Chrome PWA ────────────────────────────────────────── -->
    <meta name="theme-color" content="#005baa" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#005baa" media="(prefers-color-scheme: light)" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="VIKO EIF Timetable" />
    <meta property="og:description" content="View your VIKO EIF class schedule and get daily Telegram notifications." />
    <meta property="og:image"       content="/icons/icon-512x512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
